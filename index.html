<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quran Verse Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h1>Quran Verse</h1>
        
        <p id="arabic-text" class="arabic">Loading...</p>
        
        <p id="translation-text">Fetching translation...</p>
        
        <h3 id="verse-info"></h3>

        <div class="button-group">
            <button onclick="getVerse()" class="btn-next">New Verse</button>
            <button onclick="copyToClipboard()" class="btn-share">Copy to Share</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
